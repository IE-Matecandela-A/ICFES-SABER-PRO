<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Debug</title>
</head>

<body>
    <h1>Debug Output:</h1>
    <pre id="log"></pre>
    <script>
        window.onerror = function (msg, url, line, col, error) {
            document.getElementById('log').textContent += '\nError: ' + msg + '\nLine: ' + line + '\nCol: ' + col + '\nStack: ' + (error ? error.stack : '');
            return false; // let default handler run too
        };
    </script>
    <script src="js/app.js"></script>
</body>

</html>
