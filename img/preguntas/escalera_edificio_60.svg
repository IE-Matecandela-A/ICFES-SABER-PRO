<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f8fafc"/>
  <rect x="200" y="50" width="80" height="200" fill="#cbd5e1" stroke="#475569" stroke-width="2"/> <!-- Edificio -->
  <line x1="20" y1="250" x2="280" y2="250" stroke="#475569" stroke-width="4"/> <!-- Suelo -->
  
  <!-- Triangulo: hipotenusa 200, adyacente (suelo) = 200 * cos(60) = 100, opuesto (altura H) = 200 * sen(60) = 173.2 -->
  <line x1="100" y1="250" x2="200" y2="76.8" stroke="#3b82f6" stroke-width="6" stroke-linecap="round"/> <!-- Escalera -->
  
  <text x="110" y="160" font-family="Arial" font-size="16" fill="#1e293b" transform="rotate(-60 110,160)">6 m</text>
  <text x="240" y="150" font-family="Arial" font-size="18" fill="#1e293b" text-anchor="middle">Edificio</text>
  
  <!-- Angle arc 60 deg -->
  <path d="M 130 250 A 30 30 0 0 0 115 224" fill="none" stroke="#ef4444" stroke-width="2"/>
  <text x="140" y="240" font-family="Arial" font-size="14" fill="#ef4444">60°</text>
  
  <!-- Distancia H -->
  <line x1="190" y1="250" x2="190" y2="76.8" stroke="#ef4444" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="175" y="160" font-family="Arial" font-size="16" font-weight="bold" fill="#ef4444">H</text>
</svg>
