<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 450 200">
  <rect width="450" height="200" fill="#f8fafc"/>
  <!-- Superior -->
  <text x="75" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Vista Superior</text>
  <rect x="35" y="60" width="80" height="80" fill="#e2e8f0" stroke="#475569" stroke-width="2"/>
  <line x1="35" y1="86.6" x2="115" y2="86.6" stroke="#475569" stroke-width="2"/>
  <line x1="35" y1="113.3" x2="115" y2="113.3" stroke="#475569" stroke-width="2"/>
  <line x1="61.6" y1="60" x2="61.6" y2="140" stroke="#475569" stroke-width="2"/>
  <line x1="88.3" y1="60" x2="88.3" y2="140" stroke="#475569" stroke-width="2"/>
  
  <!-- Frontal -->
  <text x="225" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Vista Frontal</text>
  <rect x="185" y="113" width="80" height="27" fill="#cbd5e1" stroke="#475569" stroke-width="2"/>
  <line x1="211.6" y1="113" x2="211.6" y2="140" stroke="#475569" stroke-width="2"/>
  <line x1="238.3" y1="113" x2="238.3" y2="140" stroke="#475569" stroke-width="2"/>

  <!-- Lateral -->
  <text x="375" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Vista Lateral</text>
  <!-- Steps: right side is highest. -->
  <rect x="335" y="113" width="26.6" height="27" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
  <rect x="361.6" y="86" width="26.6" height="54" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
  <rect x="388.3" y="60" width="26.6" height="80" fill="#94a3b8" stroke="#475569" stroke-width="2"/>
</svg>
