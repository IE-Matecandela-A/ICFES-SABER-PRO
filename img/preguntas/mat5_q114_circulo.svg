<svg width="400" height="400" viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="white" />
  <style>
    .axis { stroke: black; stroke-width: 2; fill: none; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: black; font-weight: bold; }
    .grid { stroke: #ccc; stroke-width: 1; stroke-dasharray: 2; }
    .shape { stroke: black; stroke-width: 2; fill: none; }
  </style>

  <!-- Grid and Labels -->
  <text x="210" y="40" class="label">Cuadrante 1</text>
  <text x="40" y="40" class="label">Cuadrante 2</text>
  <text x="40" y="370" class="label">Cuadrante 3</text>
  <text x="210" y="370" class="label">Cuadrante 4</text>

  <!-- Axes (Origin at 120, 100 roughly?) No, let's use 120, 100 -->
  <!-- Let 1 unit = 30px -->
  <!-- X axis from -4 to 5 -->
  <!-- Y axis from 2 to -6 -->
  
  <!-- Let Origin (0,0) be at x=140, y=100 -->
  <line x1="20" y1="100" x2="380" y2="100" class="axis" /> <!-- X -->
  <line x1="140" y1="20" x2="140" y2="380" class="axis" /> <!-- Y -->

  <!-- X ticks -->
  <text x="145" y="115" class="label">0</text>
  <text x="170" y="115" class="label">1</text>
  <text x="200" y="115" class="label">2</text>
  <text x="230" y="115" class="label">3</text>
  <text x="260" y="115" class="label">4</text>
  <text x="290" y="115" class="label">5</text>
  <text x="110" y="115" class="label">-1</text>
  <text x="80" y="115" class="label">-2</text>
  <text x="50" y="115" class="label">-3</text>
  <text x="20" y="115" class="label">-4</text>

  <!-- Y ticks -->
  <text x="120" y="70" class="label">1</text>
  <text x="120" y="40" class="label">2</text>
  <text x="120" y="130" class="label">-1</text>
  <text x="120" y="160" class="label">-2</text>
  <text x="120" y="190" class="label">-3</text>
  <text x="120" y="220" class="label">-4</text>
  <text x="120" y="250" class="label">-5</text>
  <text x="120" y="280" class="label">-6</text>

  <!-- Circle -->
  <!-- Center O(2, -2) -> x = 140 + 2*30 = 200, y = 100 + 2*30 = 160 -->
  <!-- Points P(0,0) -> 140, 100 and Q(0, -4) -> 140, 220 -->
  <!-- Radius = sqrt(2^2 + 2^2) = sqrt(8) approx 2.82 units -> 2.82 * 30 = 84.6 -->
  <circle cx="200" cy="160" r="85" class="shape" />
  
  <!-- Points and Radii -->
  <circle cx="140" cy="100" r="3" fill="black" />
  <text x="145" y="95" class="label">P</text>
  
  <circle cx="140" cy="220" r="3" fill="black" />
  <text x="125" y="225" class="label">Q</text>
  
  <circle cx="200" cy="160" r="3" fill="black" />
  <text x="205" y="155" class="label">O</text>
  
  <line x1="200" y1="160" x2="140" y2="100" class="shape" />
  <line x1="200" y1="160" x2="140" y2="220" class="shape" />
  
  <!-- Right angle mark at O -->
  <path d="M 185 145 L 170 160 L 185 175" fill="none" stroke="black" stroke-width="1.5" />
</svg>
