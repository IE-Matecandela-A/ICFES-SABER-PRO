<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .road { fill: #95a5a6; }
            .car { fill: #e74c3c; stroke: #c0392b; stroke-width: 2; }
            .wheel { fill: #2c3e50; }
            .person { fill: none; stroke: #1a252f; stroke-width: 4; stroke-linecap: round; }
            .head { fill: #1a252f; }
            .arrow { fill: none; stroke: #e67e22; stroke-width: 4; marker-end: url(#arrowhead); }
            .text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #1a252f; }
            .motion { stroke: #bdc3c7; stroke-width: 2; stroke-dasharray: 4 4; }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22" />
        </marker>
    </defs>
    
    <rect x="0" y="0" width="100%" height="100%" class="bg"/>
    <rect x="0" y="220" width="400" height="80" class="road"/>
    <line x1="0" y1="220" x2="400" y2="220" stroke="#7f8c8d" stroke-width="4"/>

    <!-- Car body -->
    <path d="M 80 180 L 120 120 L 250 120 L 300 180 L 320 180 L 320 220 L 60 220 L 60 180 Z" class="car"/>
    
    <!-- Wheels -->
    <circle cx="100" cy="220" r="25" class="wheel"/>
    <circle cx="100" cy="220" r="10" fill="#7f8c8d"/>
    <circle cx="280" cy="220" r="25" class="wheel"/>
    <circle cx="280" cy="220" r="10" fill="#7f8c8d"/>
    
    <!-- Windows -->
    <path d="M 125 125 L 180 125 L 180 175 L 95 175 Z" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>
    <path d="M 190 125 L 245 125 L 285 175 L 190 175 Z" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="2"/>

    <!-- Person (Driver) projected forward -->
    <circle cx="165" cy="140" r="12" class="head"/>
    <!-- Body tilted forward -->
    <line x1="160" y1="150" x2="135" y2="175" class="person"/>
    <!-- Arms -->
    <line x1="150" y1="160" x2="185" y2="165" class="person"/>
    
    <!-- Steering wheel -->
    <line x1="185" y1="165" x2="195" y2="150" stroke="#34495e" stroke-width="4"/>

    <!-- Arrows highlighting physics -->
    <path d="M 330 200 L 280 200" class="arrow" stroke="#e74c3c"/>
    <text x="340" y="205" class="text" fill="#e74c3c">Frenada</text>
    
    <!-- Inertia Arrow -->
    <path d="M 160 110 L 190 110" class="arrow"/>
    <text x="120" y="90" class="text" fill="#e67e22">Movimiento del pasajero</text>

    <!-- Braking lines -->
    <line x1="140" y1="230" x2="350" y2="230" stroke="#2c3e50" stroke-width="3" stroke-dasharray="10 5"/>
</svg>
