    <!-- Sign text -->
    <text x="220" y="100" fill="#ffffff" font-family="'Arial Black', Arial, sans-serif" font-size="17" font-weight="900" text-anchor="middle" letter-spacing="1">SUMMER SALE!</text>
        <text x="220" y="132" fill="#ffffff" font-family="'Arial Black', Arial, sans-serif" font-size="17" font-weight="900" text-anchor="middle" letter-spacing="1">50% OFF ALL</text>
        <text x="220" y="164" fill="#ffffff" font-family="'Arial Black', Arial, sans-serif" font-size="17" font-weight="900" text-anchor="middle" letter-spacing="1">BOOTS AND SNEAKERS</text>
