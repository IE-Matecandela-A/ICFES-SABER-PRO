<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 202" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .sign-bg { fill: #78350f; }
            .border { fill: none; stroke: #78350f; stroke-width: 6; rx: 12; }
        </style>
    </defs>
    <!-- White page background -->
    <rect x="0" y="0" width="440" height="202" fill="#ffffff"/>
    <!-- Sign board -->
    <rect x="20" y="20" width="400" height="162" rx="12" ry="12" fill="#78350f"/>
    <!-- Inner border -->
    <rect x="28" y="28" width="384" height="146" rx="8" ry="8" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="3"/>
    <!-- Icon -->
    <text x="220" y="72" font-size="36" text-anchor="middle">🦁</text>
    <!-- Sign text -->
    <text x="220" y="100" fill="#ffffff" font-family="'Arial Black', Arial, sans-serif" font-size="17" font-weight="900" text-anchor="middle" letter-spacing="1">DO NOT FEED THE ANIMALS</text>
        <text x="220" y="132" fill="#ffffff" font-family="'Arial Black', Arial, sans-serif" font-size="17" font-weight="900" text-anchor="middle" letter-spacing="1">THEY HAVE A SPECIAL DIET</text>
</svg>