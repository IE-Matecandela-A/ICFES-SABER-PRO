<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .cell { fill: #fdf5e6; stroke: #e67e22; stroke-width: 4; }
            .nucleus { fill: #9b59b6; stroke: #8e44ad; stroke-width: 3; }
            .er { fill: #3498db; stroke: #2980b9; stroke-width: 2; }
            .golgi { fill: #2ecc71; stroke: #27ae60; stroke-width: 3; }
            .vesicle { fill: #f1c40f; stroke: #f39c12; stroke-width: 2; }
            .text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 14px; font-weight: bold; fill: #2c3e50; }
            .arrow { fill: none; stroke: #e74c3c; stroke-width: 2; marker-end: url(#arrowhead); }
        </style>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#e74c3c" />
        </marker>
    </defs>
    
    <rect x="0" y="0" width="100%" height="100%" class="bg"/>

    <!-- Cell Membrane -->
    <rect x="20" y="20" width="360" height="260" rx="40" ry="40" class="cell"/>
    <text x="35" y="45" class="text" fill="#e67e22">Membrana Celular</text>

    <!-- Nucleus -->
    <circle cx="80" cy="150" r="40" class="nucleus"/>
    <text x="55" y="155" class="text" fill="#ffffff">Núcleo</text>

    <!-- Endoplasmic Reticulum -->
    <path d="M 130 110 Q 150 130 130 150 Q 150 170 130 190" fill="none" class="er" stroke-width="8"/>
    <path d="M 140 100 Q 170 130 140 150 Q 170 170 140 200" fill="none" class="er" stroke-width="8"/>
    <text x="110" y="90" class="text" fill="#2980b9">Retículo E.</text>

    <!-- Golgi Apparatus -->
    <!-- Stack of flattened sacs -->
    <path d="M 220 100 Q 250 150 220 200" fill="none" class="golgi" stroke-width="12" stroke-linecap="round"/>
    <path d="M 240 110 Q 270 150 240 190" fill="none" class="golgi" stroke-width="12" stroke-linecap="round"/>
    <path d="M 260 120 Q 290 150 260 180" fill="none" class="golgi" stroke-width="12" stroke-linecap="round"/>
    <text x="210" y="225" class="text" fill="#27ae60">Aparato de Golgi</text>

    <!-- Vesicles -->
    <!-- From ER to Golgi -->
    <circle cx="185" cy="130" r="6" class="vesicle"/>
    <path d="M 160 130 L 205 130" class="arrow"/>
    
    <!-- From Golgi to exterior (Exportation) -->
    <circle cx="310" cy="150" r="8" class="vesicle"/>
    <circle cx="340" cy="130" r="8" class="vesicle"/>
    
    <path d="M 280 150 L 320 150" class="arrow"/>
    <path d="M 320 150 Q 360 150 380 130" class="arrow"/>
    
    <text x="280" y="180" class="text" fill="#f39c12">Vesículas de</text>
    <text x="280" y="195" class="text" fill="#f39c12">Secreción</text>

</svg>
