<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .chamber { fill: #ecf0f1; stroke: #95a5a6; stroke-width: 4; }
            .ground { fill: #7f8c8d; stroke: #34495e; stroke-width: 4; }
            .text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 16px; font-weight: bold; fill: #2c3e50; }
            .ball { fill: #34495e; }
            .feather { fill: none; stroke: #3498db; stroke-width: 2; }
            .motion { stroke: #e74c3c; stroke-width: 2; stroke-dasharray: 5 5; }
            .arrow { fill: none; stroke: #e74c3c; stroke-width: 2; marker-end: url(#arrowhead); }
        </style>
        <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
            <polygon points="0 0, 8 3, 0 6" fill="#e74c3c" />
        </marker>
    </defs>
    
    <rect x="0" y="0" width="100%" height="100%" class="bg"/>

    <!-- Vacuum Chamber -->
    <rect x="80" y="30" width="240" height="230" rx="10" ry="10" class="chamber"/>
    <text x="125" y="55" class="text" fill="#2980b9">Cámara de Vacío</text>
    <text x="140" y="75" class="text" fill="#7f8c8d" font-size="12">(Sin aire = Cero fricción)</text>

    <!-- Ground Floor -->
    <rect x="80" y="240" width="240" height="20" class="ground"/>
    <text x="180" y="255" class="text" fill="#ffffff">Suelo</text>

    <!-- Initial Positions (Faded) -->
    <!-- Ball 5kg -->
    <circle cx="140" cy="100" r="18" fill="#95a5a6"/>
    <!-- Feather -->
    <path d="M 260 85 Q 270 100 260 115 Q 250 100 260 85 Z" fill="#bdc3c7"/>
    <path d="M 260 85 L 260 120" stroke="#7f8c8d" stroke-width="2"/>

    <!-- Final Positions (Solid, striking the ground simultaneously) -->
    <!-- Ball 5kg -->
    <circle cx="140" cy="222" r="18" class="ball"/>
    <text x="125" y="227" class="text" fill="#ffffff" font-size="12">5 kg</text>
    
    <!-- Feather -->
    <path d="M 260 207 Q 270 222 260 237 Q 250 222 260 207 Z" fill="#ecf0f1" stroke="#3498db" stroke-width="2"/>
    <path d="M 260 207 L 260 242" stroke="#3498db" stroke-width="2"/>

    <!-- Motion paths (drop lines) -->
    <line x1="140" y1="125" x2="140" y2="195" class="arrow"/>
    <line x1="260" y1="125" x2="260" y2="195" class="arrow"/>

    <!-- Gravity indicator -->
    <text x="330" y="160" class="text" fill="#e74c3c">g = 9.8</text>
    <text x="335" y="180" class="text" fill="#e74c3c">m/s²</text>
    <line x1="345" y1="190" x2="345" y2="230" class="arrow"/>
    
</svg>
