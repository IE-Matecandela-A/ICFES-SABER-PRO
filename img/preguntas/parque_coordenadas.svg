<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <rect width="300" height="250" fill="#f8fafc"/>
  <!-- Grid -->
  <g stroke="#e2e8f0" stroke-width="1">
    <line x1="40" y1="20" x2="40" y2="210"/>
    <line x1="80" y1="20" x2="80" y2="210"/>
    <line x1="120" y1="20" x2="120" y2="210"/>
    <line x1="160" y1="20" x2="160" y2="210"/>
    <line x1="200" y1="20" x2="200" y2="210"/>
    <line x1="240" y1="20" x2="240" y2="210"/>
    
    <line x1="30" y1="200" x2="280" y2="200"/>
    <line x1="30" y1="160" x2="280" y2="160"/>
    <line x1="30" y1="120" x2="280" y2="120"/>
    <line x1="30" y1="80" x2="280" y2="80"/>
    <line x1="30" y1="40" x2="280" y2="40"/>
  </g>
  <!-- Axes -->
  <line x1="40" y1="20" x2="40" y2="210" stroke="#94a3b8" stroke-width="2"/>
  <line x1="30" y1="200" x2="280" y2="200" stroke="#94a3b8" stroke-width="2"/>
  <text x="270" y="215" font-family="Arial" font-size="12" fill="#64748b">X</text>
  <text x="20" y="30" font-family="Arial" font-size="12" fill="#64748b">Y</text>
  
  <!-- Labels X -->
  <text x="80" y="220" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle">1</text>
  <text x="120" y="220" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle">2</text>
  <text x="160" y="220" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle">3</text>
  <text x="200" y="220" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle">4</text>
  <text x="240" y="220" font-family="Arial" font-size="12" fill="#64748b" text-anchor="middle">5</text>
  
  <!-- Labels Y -->
  <text x="25" y="165" font-family="Arial" font-size="12" fill="#64748b">1</text>
  <text x="25" y="125" font-family="Arial" font-size="12" fill="#64748b">2</text>
  <text x="25" y="85" font-family="Arial" font-size="12" fill="#64748b">3</text>
  <text x="25" y="45" font-family="Arial" font-size="12" fill="#64748b">4</text>
  
  <!-- Rectangle: x from 2 to 5, y from 1 to 3 -->
  <!-- x coordinates: 2 -> 120, 5 -> 240. Width = 120 -->
  <!-- y coordinates: 1 -> 160, 3 -> 80. Height = 80 -->
  <rect x="120" y="80" width="120" height="80" fill="rgba(34, 197, 94, 0.4)" stroke="#22c55e" stroke-width="3"/>
  <text x="180" y="125" font-family="Arial" font-size="14" font-weight="bold" fill="#166534" text-anchor="middle">ZONA DEL PARQUE</text>
</svg>
