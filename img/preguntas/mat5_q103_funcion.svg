<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Fixed White Background -->
  <rect width="320" height="80" fill="#ffffff" />
  
  <style>
    text { font-family: 'Times New Roman', serif; fill: #000000; }
    .fn { font-size: 22px; font-style: italic; }
    .big { font-size: 28px; }
    .small { font-size: 18px; font-style: italic; }
    .sup { font-size: 14px; font-style: italic; }
    .frac-line { stroke: #000000; stroke-width: 1.5; }
    .radical-line { stroke: #000000; stroke-width: 1.8; fill: none; }
  </style>

  <!-- f(x) = -->
  <text class="fn" x="8" y="48">f(x) =</text>

  <!-- Radical sign path -->
  <polyline class="radical-line" points="97,58 104,68 112,28 208,28" />

  <!-- x² - 1 under the radical -->
  <text class="small" x="116" y="52">x</text>
  <text class="sup" x="128" y="42">2</text>
  <text class="small" x="136" y="52"> &#8722; 1</text>

  <!-- plus sign -->
  <text class="big" x="216" y="52">+</text>

  <!-- 1/x fraction -->
  <!-- numerator 1 -->
  <text class="small" x="252" y="38">1</text>
  <!-- fraction bar -->
  <line class="frac-line" x1="248" y1="44" x2="272" y2="44"/>
  <!-- denominator x -->
  <text class="small" x="255" y="62">x</text>
</svg>
