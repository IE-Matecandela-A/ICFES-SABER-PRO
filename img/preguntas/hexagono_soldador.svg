<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f8fafc"/>
  
  <g transform="translate(150, 150)">
    <!-- Hexagono Regular -->
    <!-- R = 100, angles: 30, 90, 150, 210, 270, 330 -->
    <polygon points="86.6,50 0,100 -86.6,50 -86.6,-50 0,-100 86.6,-50" fill="#e2e8f0" stroke="#334155" stroke-width="5" stroke-linejoin="round"/>
    
    <!-- Etiquetas de los lados 'L' -->
    <text x="50" y="-80" font-family="Arial" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">L</text>
    <text x="95" y="5" font-family="Arial" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">L</text>
    <text x="50" y="90" font-family="Arial" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">L</text>
    <text x="-50" y="90" font-family="Arial" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">L</text>
    <text x="-95" y="5" font-family="Arial" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">L</text>
    <text x="-50" y="-80" font-family="Arial" font-size="20" font-weight="bold" fill="#ef4444" text-anchor="middle">L</text>

    <!-- Indicador de ecuacion en el centro -->
    <text x="0" y="-5" font-family="Arial" font-size="16" fill="#1e293b" text-anchor="middle">Perímetro</text>
    <text x="0" y="15" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">3 × (L + L)</text>
    <text x="0" y="35" font-family="Arial" font-size="18" font-weight="bold" fill="#22c55e" text-anchor="middle">¿ = ?</text>
  </g>
</svg>
