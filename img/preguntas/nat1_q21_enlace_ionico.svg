<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" width="100%" height="100%">
    <defs>
        <style>
            .bg { fill: #ffffff; }
            .atom-na { fill: #f1c40f; stroke: #f39c12; stroke-width: 3; }
            .atom-cl { fill: #2ecc71; stroke: #27ae60; stroke-width: 3; }
            .elec { fill: #e74c3c; stroke: #c0392b; stroke-width: 1; }
            .orbit { fill: none; stroke: #bdc3c7; stroke-width: 2; stroke-dasharray: 4 4; }
            .text { font-family: 'Segoe UI', Arial, sans-serif; font-size: 18px; font-weight: bold; fill: #2c3e50; }
            .label { font-size: 14px; fill: #7f8c8d; }
            .arrow { fill: none; stroke: #3498db; stroke-width: 3; marker-end: url(#arrowhead); }
        </style>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#3498db" />
        </marker>
    </defs>
    
    <rect x="0" y="0" width="100%" height="100%" class="bg"/>

    <!-- SODIUM (Na) Atom -->
    <circle cx="100" cy="150" r="40" class="atom-na"/>
    <text x="85" y="155" class="text">Na</text>
    <text x="80" y="210" class="label">Sodio (Metal)</text>

    <!-- Sodium Valence Electron -->
    <circle cx="145" cy="115" r="5" class="elec" id="electron"/>
    <text x="125" y="110" class="label" fill="#e74c3c">e-</text>

    <!-- CHLORINE (Cl) Atom -->
    <circle cx="300" cy="150" r="50" class="atom-cl"/>
    <text x="290" y="155" class="text">Cl</text>
    <text x="260" y="220" class="label">Cloro (No metal)</text>

    <!-- Chlorine Valence Electrons (7) -->
    <circle cx="260" cy="110" r="5" fill="#34495e"/>
    <circle cx="270" cy="90" r="5" fill="#34495e"/>
    <circle cx="330" cy="100" r="5" fill="#34495e"/>
    <circle cx="345" cy="130" r="5" fill="#34495e"/>
    <circle cx="340" cy="180" r="5" fill="#34495e"/>
    <circle cx="310" cy="195" r="5" fill="#34495e"/>
    <circle cx="265" cy="180" r="5" fill="#34495e"/>
    
    <!-- Empty slot in Chlorine -->
    <circle cx="250" cy="140" r="5" class="orbit"/>

    <!-- Electron Transfer Arrow -->
    <path d="M 155 115 Q 200 80 240 130" class="arrow"/>
    
    <!-- Title -->
    <text x="110" y="40" class="text">Transferencia de Electrones</text>
    <text x="130" y="60" class="label" fill="#3498db">Enlace Iónico (NaCl)</text>
</svg>
