<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <rect width="300" height="300" fill="#f8fafc"/>
  <circle cx="150" cy="150" r="100" fill="none" stroke="#3b82f6" stroke-width="3"/>
  
  <!-- Axes -->
  <line x1="150" y1="20" x2="150" y2="280" stroke="#94a3b8" stroke-width="2"/>
  <line x1="20" y1="150" x2="280" y2="150" stroke="#94a3b8" stroke-width="2"/>
  
  <!-- Quadrants labels -->
  <text x="250" y="50" font-family="Arial" font-size="16" fill="#94a3b8">I</text>
  <text x="40" y="50" font-family="Arial" font-size="16" fill="#94a3b8">II</text>
  <text x="40" y="270" font-family="Arial" font-size="16" fill="#94a3b8">III</text>
  <text x="250" y="270" font-family="Arial" font-size="16" fill="#94a3b8">IV</text>
  
  <text x="160" y="140" font-family="Arial" font-size="14" font-weight="bold" fill="#1e293b">O (0,0)</text>
  <circle cx="150" cy="150" r="4" fill="#ef4444"/>

  <!-- P (Quadrant I) -->
  <circle cx="230" cy="90" r="5" fill="#ef4444"/>
  <text x="240" y="85" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b">P</text>
  <line x1="150" y1="150" x2="230" y2="90" stroke="#10b981" stroke-width="2" stroke-dasharray="4 2"/>
  
  <!-- Q (Quadrant III) -->
  <circle cx="90" cy="230" r="5" fill="#ef4444"/>
  <text x="70" y="245" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b">Q</text>
  <line x1="150" y1="150" x2="90" y2="230" stroke="#10b981" stroke-width="2" stroke-dasharray="4 2"/>
  
</svg>
