<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 350">
  <rect width="400" height="350" fill="#f8fafc"/>
  
  <!-- Titulo -->
  <text x="200" y="30" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Estudiantes matriculados por idioma extranjero</text>
  <text x="200" y="50" font-family="Arial" font-size="14" fill="#475569" text-anchor="middle">Total: 150 estudiantes</text>

  <g transform="translate(20, 70)">
    <!-- Conjuntos (Circulos) -->
    <!-- Circulo Ingles (Arriba Izquierda) -->
    <circle cx="130" cy="100" r="90" fill="rgba(59, 130, 246, 0.2)" stroke="#3b82f6" stroke-width="2"/>
    <text x="70" y="50" font-family="Arial" font-size="16" font-weight="bold" fill="#1d4ed8">Inglés</text>

    <!-- Circulo Frances (Arriba Derecha) -->
    <circle cx="230" cy="100" r="90" fill="rgba(239, 68, 68, 0.2)" stroke="#ef4444" stroke-width="2"/>
    <text x="290" y="50" font-family="Arial" font-size="16" font-weight="bold" fill="#b91c1c">Francés</text>

    <!-- Circulo Aleman (Abajo Centro) -->
    <circle cx="180" cy="180" r="90" fill="rgba(34, 197, 94, 0.2)" stroke="#22c55e" stroke-width="2"/>
    <text x="180" y="250" font-family="Arial" font-size="16" font-weight="bold" fill="#15803d" text-anchor="middle">Alemán</text>

    <!-- Valores -->
    <!-- Solo Ingles -->
    <text x="100" y="90" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">40</text>
    
    <!-- Solo Frances -->
    <text x="260" y="90" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">35</text>
    
    <!-- Solo Aleman -->
    <text x="180" y="210" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">25</text>

    <!-- Intersecciones dobles -->
    <!-- Ingles y Frances (sin Aleman) -->
    <text x="180" y="80" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">15</text>
    
    <!-- Ingles y Aleman (sin Frances) -->
    <text x="130" y="150" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">10</text>
    
    <!-- Frances y Aleman (sin Ingles) -->
    <text x="230" y="150" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">20</text>

    <!-- Interseccion Triple -->
    <!-- Ingles, Frances y Aleman -->
    <text x="180" y="125" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">5</text>

  </g>
</svg>
