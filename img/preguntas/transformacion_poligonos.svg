<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <rect width="300" height="250" fill="#f8fafc"/>
  <!-- Axes -->
  <line x1="150" y1="20" x2="150" y2="230" stroke="#94a3b8" stroke-width="2"/>
  <line x1="20" y1="180" x2="280" y2="180" stroke="#94a3b8" stroke-width="2"/>
  <text x="270" y="170" font-family="Arial" font-size="14" fill="#64748b">X</text>
  <text x="160" y="30" font-family="Arial" font-size="14" fill="#64748b">Y</text>
  
  <!-- Poligono 1 (left) -->
  <polygon points="60,80 120,80 120,100 80,100 80,150 60,150" fill="rgba(239, 68, 68, 0.4)" stroke="#ef4444" stroke-width="3"/>
  <text x="80" y="60" font-family="Arial" font-size="14" font-weight="bold" fill="#b91c1c" text-anchor="middle">Polígono 1</text>
  
  <!-- Poligono 2 (right) -->
  <polygon points="240,80 180,80 180,100 220,100 220,150 240,150" fill="rgba(59, 130, 246, 0.4)" stroke="#3b82f6" stroke-width="3"/>
  <text x="220" y="60" font-family="Arial" font-size="14" font-weight="bold" fill="#1d4ed8" text-anchor="middle">Polígono 2</text>
</svg>
