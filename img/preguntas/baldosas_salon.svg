<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 250">
  <rect width="300" height="250" fill="#f8fafc"/>
  <!-- 5x4 grid. 5 columns, 4 rows. Dimensions: 200x160, top-left 50,45 -->
  <rect x="50" y="45" width="200" height="160" fill="#e2e8f0" stroke="#1e293b" stroke-width="4"/>
  <!-- vertical lines -->
  <line x1="90" y1="45" x2="90" y2="205" stroke="#94a3b8" stroke-width="2"/>
  <line x1="130" y1="45" x2="130" y2="205" stroke="#94a3b8" stroke-width="2"/>
  <line x1="170" y1="45" x2="170" y2="205" stroke="#94a3b8" stroke-width="2"/>
  <line x1="210" y1="45" x2="210" y2="205" stroke="#94a3b8" stroke-width="2"/>
  <!-- horizontal lines -->
  <line x1="50" y1="85" x2="250" y2="85" stroke="#94a3b8" stroke-width="2"/>
  <line x1="50" y1="125" x2="250" y2="125" stroke="#94a3b8" stroke-width="2"/>
  <line x1="50" y1="165" x2="250" y2="165" stroke="#94a3b8" stroke-width="2"/>
  <text x="150" y="30" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle">5 m (Largo)</text>
  <text x="35" y="125" font-family="Arial" font-size="18" font-weight="bold" fill="#1e293b" text-anchor="middle" transform="rotate(-90 35,125)">4 m (Ancho)</text>
</svg>
