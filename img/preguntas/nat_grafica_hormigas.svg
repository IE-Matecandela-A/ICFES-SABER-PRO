<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="400" height="300" fill="#f8fafc"/>
  
  <!-- Titulo (Falta convension!) -->
  <text x="200" y="40" font-family="Arial" font-size="16" font-weight="bold" fill="#1e293b" text-anchor="middle">Consumo de Hojas en Árboles de Acacia</text>

  <g transform="translate(60, 240)">
    <!-- Ejes -->
    <line x1="0" y1="0" x2="300" y2="0" stroke="#475569" stroke-width="2"/>
    <line x1="0" y1="0" x2="0" y2="-170" stroke="#475569" stroke-width="2"/>
    
    <!-- Etiquetas Eje Y -->
    <text x="-40" y="-80" font-family="Arial" font-size="14" font-weight="bold" fill="#475569" transform="rotate(-90 -40,-80)" text-anchor="middle">Porcentaje Consumido (%)</text>
    
    <text x="-10" y="0" font-family="Arial" font-size="12" fill="#64748b" text-anchor="end">0</text>
    <text x="-10" y="-40" font-family="Arial" font-size="12" fill="#64748b" text-anchor="end">25</text>
    <text x="-10" y="-80" font-family="Arial" font-size="12" fill="#64748b" text-anchor="end">50</text>
    <text x="-10" y="-120" font-family="Arial" font-size="12" fill="#64748b" text-anchor="end">75</text>
    <text x="-10" y="-160" font-family="Arial" font-size="12" fill="#64748b" text-anchor="end">100</text>
    
    <!-- Lineas guia -->
    <line x1="0" y1="-40" x2="300" y2="-40" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 2"/>
    <line x1="0" y1="-80" x2="300" y2="-80" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 2"/>
    <line x1="0" y1="-120" x2="300" y2="-120" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 2"/>
    <line x1="0" y1="-160" x2="300" y2="-160" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4 2"/>

    <!-- Barras (Sin convenciones claras, como dice el problema!) -->
    <!-- Barra 1: Supongamos que es "SIN hormigas", mucho consumo -->
    <rect x="50" y="-140" width="60" height="140" fill="#3b82f6" rx="2"/>
    <text x="80" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Árboles G1</text>
    
    <!-- Barra 2: Supongamos que es "CON hormigas", menos consumo -->
    <rect x="180" y="-30" width="60" height="30" fill="#22c55e" rx="2"/>
    <text x="210" y="20" font-family="Arial" font-size="14" font-weight="bold" fill="#1e293b" text-anchor="middle">Árboles G2</text>
  </g>
  
  <!-- ERROR INTENCIONAL: No hay cuadro de leyendas que explique qué es G1 y G2 o qué color es cual -->
  <g transform="translate(10, 280)">
    <text x="190" y="0" font-family="Arial" font-size="12" font-style="italic" fill="#ef4444" text-anchor="middle">*Nota: ¿Qué color representa a los árboles con hormigas?</text>
  </g>
</svg>
