<svg width="600" height="250" viewBox="0 0 600 250" xmlns="http://www.w3.org/2000/svg">
  <rect width="600" height="250" fill="white" />
  <style>
    .line { stroke: black; stroke-width: 2; fill: none; }
    .label { font-family: Arial, sans-serif; font-size: 14px; fill: black; }
    .table-text { font-family: Arial, sans-serif; font-size: 12px; fill: black; }
    .table-line { stroke: black; stroke-width: 1; }
  </style>

  <!-- Trigonometric Table -->
  <rect x="50" y="50" width="130" height="80" fill="none" stroke="black" stroke-width="1.5" />
  <line x1="100" y1="50" x2="100" y2="130" class="table-line" />
  <line x1="140" y1="50" x2="140" y2="130" class="table-line" />
  <line x1="50" y1="75" x2="180" y2="75" class="table-line" />
  <line x1="50" y1="105" x2="180" y2="105" class="table-line" />
  
  <text x="75" y="67" class="table-text" text-anchor="middle">x</text>
  <text x="120" y="67" class="table-text" text-anchor="middle">30°</text>
  <text x="160" y="67" class="table-text" text-anchor="middle">60°</text>
  
  <text x="75" y="93" class="table-text" text-anchor="middle">sen (x)</text>
  <text x="120" y="90" class="table-text" text-anchor="middle">1</text>
  <line x1="110" y1="92" x2="130" y2="92" class="table-line" />
  <text x="120" y="103" class="table-text" text-anchor="middle">2</text>
  <text x="160" y="90" class="table-text" text-anchor="middle">√3</text>
  <line x1="150" y1="92" x2="170" y2="92" class="table-line" />
  <text x="160" y="103" class="table-text" text-anchor="middle">2</text>

  <text x="75" y="123" class="table-text" text-anchor="middle">cos (x)</text>
  <text x="120" y="117" class="table-text" text-anchor="middle">√3</text>
  <line x1="110" y1="119" x2="130" y2="119" class="table-line" />
  <text x="120" y="130" class="table-text" text-anchor="middle">2</text>
  <text x="160" y="117" class="table-text" text-anchor="middle">1</text>
  <line x1="150" y1="119" x2="170" y2="119" class="table-line" />
  <text x="160" y="130" class="table-text" text-anchor="middle">2</text>

  <!-- Truck -->
  <path d="M 220 180 L 220 50 L 450 55 L 450 180 Z" fill="#f0f0f0" stroke="black" stroke-width="2" /> <!-- Cargo -->
  <path d="M 215 180 L 215 100 L 270 100 L 270 50 L 220 50" fill="#e0e0e0" stroke="black" stroke-width="1" /> <!-- Header detail -->
  <path d="M 220 180 L 170 180 L 170 130 L 200 130 L 210 100 L 220 100" fill="#d0d0d0" stroke="black" stroke-width="2" /> <!-- Cabin -->
  <circle cx="200" cy="180" r="15" fill="#333" stroke="black" />
  <circle cx="380" cy="180" r="15" fill="#333" stroke="black" />
  <line x1="150" y1="200" x2="550" y2="200" class="line" /> <!-- Ground -->

  <!-- Ramp -->
  <line x1="450" y1="160" x2="550" y2="200" class="line" />
  <text x="500" y="175" class="label">4 m</text>
  
  <!-- Flag -->
  <line x1="550" y1="200" x2="550" y2="40" class="line" />
  <path d="M 550 40 L 590 60 L 550 80 Z" fill="none" stroke="black" stroke-width="2" />

  <!-- Labels and Angles -->
  <text x="490" y="215" class="label">L</text>
  <path d="M 450 160 L 450 200" class="dashed" stroke-dasharray="2" stroke="black" />
  <line x1="450" y1="200" x2="550" y2="200" class="dashed" stroke-dasharray="2" stroke="black" />
  
  <text x="455" y="185" class="label">60°</text>
  <text x="525" y="195" class="label">30°</text>
</svg>
