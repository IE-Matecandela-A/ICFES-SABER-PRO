<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200">
  <rect width="400" height="200" fill="#f8fafc"/>
  
  <!-- Tabla de madera -->
  <g transform="translate(40, 40)">
    <rect x="0" y="0" width="300" height="100" fill="#fef3c7" stroke="#b45309" stroke-width="4"/>
    <!-- Linea de corte diagonal -->
    <line x1="0" y1="100" x2="300" y2="0" stroke="#ef4444" stroke-width="3" stroke-dasharray="8 4"/>
    
    <!-- Triangulo 1 (inferior) -->
    <polygon points="0,100 300,100 300,0" fill="rgba(245, 158, 11, 0.2)"/>
    
    <!-- Etiquetas de medidas -->
    <text x="150" y="125" font-family="Arial" font-size="16" font-weight="bold" fill="#78350f" text-anchor="middle">Base = 120 cm</text>
    <text x="-15" y="55" font-family="Arial" font-size="16" font-weight="bold" fill="#78350f" transform="rotate(-90 -15,55)" text-anchor="middle">Altura = 40 cm</text>
    
    <!-- Indicador de corte -->
    <text x="170" y="45" font-family="Arial" font-size="14" font-weight="bold" fill="#ef4444" transform="rotate(-18 170,45)">Corte diagonal</text>
  </g>
</svg>
